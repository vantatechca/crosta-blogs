baseURL = "https://thecrostajournal.com/"
languageCode = "en-us"
title = "The Crosta Journal"
theme = "journal"
themesDir = "../../themes"
paginate = 8
enableRobotsTXT = true
# Relative asset + internal links so CSS/links resolve whether the site is served
# at a domain root, a subpath, an onrender.com URL, or opened as a file. Prevents
# the "/style.css 404 -> unstyled page" failure.
relativeURLs = true
canonifyURLs = false

[params]
  tagline = "Long-form writing on dough, fire, and the craft of Neapolitan pizza."
  brand = "Pizzeria Crosta"
  brandURL = "https://pizzeriacrosta.com/"
  description = "Long-form writing on dough, fire, and the craft of Neapolitan pizza."

[markup.goldmark.renderer]
  unsafe = true

[taxonomies]
  tag = "tags"
