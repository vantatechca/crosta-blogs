baseURL = "https://stonovenstories.com/"
languageCode = "en-us"
title = "Stories from the Stone Oven"
theme = "stoneoven"
themesDir = "../../themes"
paginate = 8
enableRobotsTXT = true
# Relative asset + internal links so CSS/links resolve whether the site is served
# at a domain root, a subpath, an onrender.com URL, or opened as a file. Prevents
# the "/style.css 404 -> unstyled page" failure.
relativeURLs = true
canonifyURLs = false

[params]
  tagline = "Tales from the hearth — the people, the heat, the slow rise."
  brand = "Pizzeria Crosta"
  brandURL = "https://pizzeriacrosta.com/"
  description = "Tales from the hearth — the people, the heat, the slow rise."

[markup.goldmark.renderer]
  unsafe = true

[taxonomies]
  tag = "tags"
