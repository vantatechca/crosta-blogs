baseURL = "https://crustandcrumb.co/"
languageCode = "en-us"
title = "Crust & Crumb"
theme = "crustcrumb"
themesDir = "../../themes"
paginate = 8
enableRobotsTXT = true
# Relative asset + internal links so CSS/links resolve whether the site is served
# at a domain root, a subpath, an onrender.com URL, or opened as a file. Prevents
# the "/style.css 404 -> unstyled page" failure.
relativeURLs = true
canonifyURLs = false

[params]
  tagline = "A precise look at fermentation, hydration, and the science of a perfect base."
  brand = "Pizzeria Crosta"
  brandURL = "https://pizzeriacrosta.com/"
  description = "A precise look at fermentation, hydration, and the science of a perfect base."

[markup.goldmark.renderer]
  unsafe = true

[taxonomies]
  tag = "tags"
