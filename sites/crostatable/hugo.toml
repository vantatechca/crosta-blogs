baseURL = "https://thecrostatable.com/"
languageCode = "en-us"
title = "The Crosta Table"
theme = "crostatable"
themesDir = "../../themes"
paginate = 8
enableRobotsTXT = true
# Relative asset + internal links so CSS/links resolve whether the site is served
# at a domain root, a subpath, an onrender.com URL, or opened as a file. Prevents
# the "/style.css 404 -> unstyled page" failure.
relativeURLs = true
canonifyURLs = false

[params]
  tagline = "Hospitality, pairings, and the art of the shared table."
  brand = "Pizzeria Crosta"
  brandURL = "https://pizzeriacrosta.com/"
  description = "Hospitality, pairings, and the art of the shared table."

[markup.goldmark.renderer]
  unsafe = true

[taxonomies]
  tag = "tags"
