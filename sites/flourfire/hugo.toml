baseURL = "https://flourandfire.co/"
languageCode = "en-us"
title = "Flour & Fire"
theme = "flourfire"
themesDir = "../../themes"
paginate = 8
enableRobotsTXT = true
# Relative asset + internal links so CSS/links resolve whether the site is served
# at a domain root, a subpath, an onrender.com URL, or opened as a file. Prevents
# the "/style.css 404 -> unstyled page" failure.
relativeURLs = true
canonifyURLs = false

[params]
  tagline = "Where 00 flour meets 480°C. The bold side of pizza."
  brand = "Pizzeria Crosta"
  brandURL = "https://pizzeriacrosta.com/"
  description = "Where 00 flour meets 480°C. The bold side of pizza."

[markup.goldmark.renderer]
  unsafe = true

[taxonomies]
  tag = "tags"
