baseURL = "https://hotouttheoven.com/"
languageCode = "en-us"
title = "Hot Out the Oven"
theme = "hotoven"
themesDir = "../../themes"
paginate = 8
enableRobotsTXT = true
# Relative asset + internal links so CSS/links resolve whether the site is served
# at a domain root, a subpath, an onrender.com URL, or opened as a file. Prevents
# the "/style.css 404 -> unstyled page" failure.
relativeURLs = true
canonifyURLs = false

[params]
  tagline = "Fresh, fast, and a little bit cheesy. Pizza, the fun way."
  brand = "Pizzeria Crosta"
  brandURL = "https://pizzeriacrosta.com/"
  description = "Fresh, fast, and a little bit cheesy. Pizza, the fun way."

[markup.goldmark.renderer]
  unsafe = true

[taxonomies]
  tag = "tags"
