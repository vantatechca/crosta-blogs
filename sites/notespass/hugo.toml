baseURL = "https://notesfromthepass.com/"
languageCode = "en-us"
title = "Notes from the Pass"
theme = "notespass"
themesDir = "../../themes"
paginate = 8
enableRobotsTXT = true
# Relative asset + internal links so CSS/links resolve whether the site is served
# at a domain root, a subpath, an onrender.com URL, or opened as a file. Prevents
# the "/style.css 404 -> unstyled page" failure.
relativeURLs = true
canonifyURLs = false

[params]
  tagline = "Working notes from the line — straight off the pass."
  brand = "Pizzeria Crosta"
  brandURL = "https://pizzeriacrosta.com/"
  description = "Working notes from the line — straight off the pass."

[markup.goldmark.renderer]
  unsafe = true

[taxonomies]
  tag = "tags"
