baseURL = "https://behindthecrust.com/"
languageCode = "en-us"
title = "Behind the Crust"
theme = "behindcrust"
themesDir = "../../themes"
paginate = 8
enableRobotsTXT = true
# Relative asset + internal links so CSS/links resolve whether the site is served
# at a domain root, a subpath, an onrender.com URL, or opened as a file. Prevents
# the "/style.css 404 -> unstyled page" failure.
relativeURLs = true
canonifyURLs = false

[params]
  tagline = "Behind the scenes at Pizzeria Crosta — the makers, the method."
  brand = "Pizzeria Crosta"
  brandURL = "https://pizzeriacrosta.com/"
  description = "Behind the scenes at Pizzeria Crosta — the makers, the method."

[markup.goldmark.renderer]
  unsafe = true

[taxonomies]
  tag = "tags"
