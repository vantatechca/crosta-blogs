# Render Blueprint — GENERATED by scripts/gen_render_yaml.py. Do not hand-edit;
# change the BLOGS list in scripts/generate_sites.py and re-run the generator.
#
# One free Static Site per blog. `buildFilters` means a push that only touches one
# blog's folders rebuilds ONLY that service — not the whole fleet.
# After first deploy: attach each real domain in the Render dashboard (free SSL).

services:
  - type: web
    runtime: static
    name: the-crosta-journal
    repo: https://github.com/vantatechca/crosta-blogs.git
    branch: main
    buildCommand: ./render-build.sh journal
    staticPublishPath: ./public/journal
    buildFilters:
      paths:
        - sites/journal/**
        - themes/journal/**
        - render-build.sh
    envVars:
      - key: HUGO_VERSION
        value: "0.139.0"

