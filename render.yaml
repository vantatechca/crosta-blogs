# Render Blueprint — GENERATED by scripts/gen_render_yaml.py. Do not hand-edit;
# change the BLOGS list in scripts/generate_sites.py and re-run the generator.
#
# One free Static Site per blog. After the blueprint applies, set per-service
# Build Filters in the Render dashboard (Settings -> Build Filters) so a push that
# only touches one blog rebuilds only that service. (Build filters are a dashboard
# setting, not a blueprint field.)
# After first deploy: attach each real domain in the dashboard (free SSL).

services:
  - type: web
    runtime: static
    name: the-crosta-journal
    repo: https://github.com/vantatechca/crosta-blogs.git
    branch: main
    buildCommand: ./render-build.sh journal
    staticPublishPath: ./public/journal
    envVars:
      - key: HUGO_VERSION
        value: "0.139.0"

